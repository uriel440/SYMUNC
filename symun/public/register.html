<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 苏韵模联</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(170deg, #faf8f5 0%, #f0e8d8 40%, #e8dcc8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .register-box {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 380px;
        }
        h2 {
            text-align: center;
            color: #8B1A2B;
            letter-spacing: 4px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 18px;
            position: relative;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 12px 40px 12px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #C9A96E;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 38px;
            cursor: pointer;
            user-select: none;
            font-size: 1.1rem;
            color: #999;
            transition: color 0.3s;
        }
        .toggle-password:hover {
            color: #8B1A2B;
        }
        .hint {
            font-size: 0.8rem;
            color: #999;
            margin-top: 4px;
        }
        .match-indicator {
            font-size: 0.8rem;
            margin-top: 4px;
        }
        .match-ok { color: #27ae60; }
        .match-fail { color: #c0392b; }
        button {
            width: 100%;
            padding: 12px;
            background: #C9A96E;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            letter-spacing: 2px;
            transition: background 0.3s;
        }
        button:hover {
            background: #b8924a;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .error {
            color: #c0392b;
            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        .links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        .links a {
            color: #8B1A2B;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="register-box">
        <h2>代表注册</h2>
        <form id="regForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="email" placeholder="请输入邮箱（用于找回密码）" required>
                <span class="hint">请绑定真实邮箱，用于找回密码</span>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="至少6位密码" required minlength="6">
                <span class="toggle-password" id="togglePwd1" title="显示密码">👁️</span>
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" id="confirmPassword" placeholder="请再次输入密码" required minlength="6">
                <span class="toggle-password" id="togglePwd2" title="显示密码">👁️</span>
                <div class="match-indicator" id="matchIndicator"></div>
            </div>
            <button type="submit" id="submitBtn">注 册</button>
        </form>
        <div class="error" id="errorMsg"></div>
        <div class="links">
            已有账号？<a href="/login.html">去登录</a> ｜ <a href="/">返回首页</a>
        </div>
    </div>

    <script>
        // 密码显示切换
        function setupToggle(toggleId, inputId) {
            const toggle = document.getElementById(toggleId);
            const input = document.getElementById(inputId);
            toggle.addEventListener('click', () => {
                if (input.type === 'password') {
                    input.type = 'text';
                    toggle.textContent = '🙈';
                } else {
                    input.type = 'password';
                    toggle.textContent = '👁️';
                }
            });
        }
        setupToggle('togglePwd1', 'password');
        setupToggle('togglePwd2', 'confirmPassword');

        // 确认密码实时校验
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const matchIndicator = document.getElementById('matchIndicator');
        const submitBtn = document.getElementById('submitBtn');

        function checkMatch() {
            const pwd = passwordInput.value;
            const confirm = confirmInput.value;
            if (confirm.length === 0) {
                matchIndicator.textContent = '';
                submitBtn.disabled = false;
                return;
            }
            if (pwd === confirm) {
                matchIndicator.textContent = '✅ 密码一致';
                matchIndicator.className = 'match-indicator match-ok';
                submitBtn.disabled = false;
            } else {
                matchIndicator.textContent = '❌ 密码不一致';
                matchIndicator.className = 'match-indicator match-fail';
                submitBtn.disabled = true;
            }
        }
        passwordInput.addEventListener('input', checkMatch);
        confirmInput.addEventListener('input', checkMatch);

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmInput.value;

            if (password !== confirmPassword) {
                document.getElementById('errorMsg').textContent = '两次密码不一致';
                return;
            }
            if (password.length < 6) {
                document.getElementById('errorMsg').textContent = '密码至少6位';
                return;
            }

            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            const data = await res.json();
            if (res.ok) {
                alert('注册成功！请登录');
                window.location.href = '/login.html';
            } else {
                document.getElementById('errorMsg').textContent = data.error;
            }
        });
    </script>
</body>
</html>
